<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ejercicio 3: Listado con filtro</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="contenedor-principal">
    <h1>Ejercicio 3: Listado con filtro</h1>
    <p class="descripcion">Mostrar todos los elementos o solo una categoría usando <code>filter</code>.</p>

    <nav>
      <a href="index.html">Inicio</a>
      <a href="destacados.html">Destacados</a>
      <a href="listado.html">Listado</a>
    </nav>
    <div class="seccion">
      <div class="botones">
        <button id="btn-todos">Mostrar todos</button>
        <button id="btn-drama">Mostrar solo drama</button>
        <button id="btn-suspenso">Mostrar solo suspenso</button>
        <button id="btn-comedia">Mostrar solo comedia</button>
      </div>
      <div id="lista-elementos"></div>
    </div>
  </div>
<!-- Ejercicio 3: listado de series filtradas por categoria con filter -->

  <script>
   var elementos = [
  { nombre: "The Crown",        categoria: "drama" },
  { nombre: "Chernobyl",        categoria: "drama" },
  { nombre: "Black Mirror",     categoria: "suspenso" },
  { nombre: "Mindhunter",       categoria: "suspenso" },
  { nombre: "Brooklyn Nine-Nine", categoria: "comedia" },
  { nombre: "Seinfeld",         categoria: "comedia" }
];

var contenedor = document.getElementById("lista-elementos");

function renderizar(lista) {
  contenedor.innerHTML = "";
  lista.forEach(function(item) {
    var div = document.createElement("div");
    div.className = "card";
    div.innerHTML = "<h3>" + item.nombre + "</h3><p>Categoría: " + item.categoria + "</p>";
    contenedor.appendChild(div);
  });
}

document.getElementById("btn-todos").addEventListener("click", function() {
  renderizar(elementos);
});

document.getElementById("btn-drama").addEventListener("click", function() {
  var soloDrama = elementos.filter(function(item) {
    return item.categoria === "drama";
  });
  renderizar(soloDrama);
});

document.getElementById("btn-suspenso").addEventListener("click", function() {
  var soloSuspenso = elementos.filter(function(item) {
    return item.categoria === "suspenso";
  });
  renderizar(soloSuspenso);
});

document.getElementById("btn-comedia").addEventListener("click", function() {
  var soloComedia = elementos.filter(function(item) {
    return item.categoria === "comedia";
  });
  renderizar(soloComedia);
});

renderizar(elementos);
  </script>

</body>
</html>
